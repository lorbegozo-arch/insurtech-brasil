document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-purple-100:  #EBE6F7;  /* = light-pink */\n  --fis-purple-200:  #D6CCF4;\n  --fis-purple-300:  #C6B5F4;  /* = \"Main gradient\" FROM */\n  --fis-purple-400:  #A793FF;  /* = \"Secondary gradient\" TO */\n  --fis-purple-500:  #8B75EE;  /* primary CTA fill (observed in app) */\n  --fis-purple-600:  #7561D9;\n  --fis-purple-700:  #5B4BB8;\n\n  /* Status colors — soft + saturated pairs */\n  --fis-red-soft:    #FFE2E7; /* \"Light red\" */\n  --fis-red:         #FFA6AB; /* \"Red\" */\n  --fis-yellow-soft: #FFFAEC; /* \"Light yellow\" */\n  --fis-yellow:      #FDE8B1; /* \"Yellow\" */\n  --fis-green-soft:  #F4FFF2; /* \"Light green\" */\n  --fis-green:       #AFD7AE; /* \"Green\" */\n\n  /* Pink accent (live badge, warning gradient) */\n  --fis-pink-live:   #FE93A7; /* Main gradient TO */\n  --fis-pink-warn:   #F37C7C; /* Warning gradient TO */\n  --fis-peach-warn:  #FFBE9A; /* Warning gradient FROM */\n  --fis-blue-bg:     #BFD0FF; /* Secondary gradient FROM */\n\n  /* Neutrals (derived to harmonize with #2A2B43) */\n  --fis-ink-900:     #2A2B43;\n  --fis-ink-700:     #3F3C63;\n  --fis-ink-500:     #6B6A85;\n  --fis-ink-400:     #8E8DA4;\n  --fis-ink-300:     #B4B3C4;\n  --fis-ink-200:     #DAD9E3;\n  --fis-ink-100:     #EDECF2;\n  --fis-ink-50:      #F7F6FA;\n\n  /* ===== GRADIENTS (exact brandbook values) ===== */\n  --fis-gradient-main:       linear-gradient(135deg, #C6B5F4 0%, #FE93A7 100%);\n  --fis-gradient-background: linear-gradient(135deg, #FBF6F9 0%, #F6E8F7 100%);\n  --fis-gradient-secondary:  linear-gradient(135deg, #BFD0FF 0%, #A793FF 100%);\n  --fis-gradient-warning:    linear-gradient(135deg, #FFBE9A 0%, #F37C7C 100%);\n\n  /* ===== SEMANTIC ALIASES ===== */\n  --fg-1: var(--fis-ink-900);      /* primary text */\n  --fg-2: var(--fis-ink-700);      /* secondary text */\n  --fg-3: var(--fis-ink-500);      /* muted text */\n  --fg-4: var(--fis-ink-400);      /* disabled / placeholder */\n  --fg-on-accent: #FFFFFF;\n  --bg-1: #FFFFFF;                 /* page bg */\n  --bg-2: var(--fis-ink-50);       /* subtle surface */\n  --bg-3: var(--fis-purple-50);    /* tinted surface */\n  --border-1: var(--fis-ink-200);\n  --border-2: var(--fis-ink-100);\n\n  --accent:        var(--fis-purple-500);\n  --accent-hover:  var(--fis-purple-600);\n  --accent-soft:   var(--fis-purple-100);\n\n  --success:       #4FA76F;\n  --success-bg:    var(--fis-green-soft);\n  --warning:       #B58400;\n  --warning-bg:    var(--fis-yellow-soft);\n  --danger:        #E35A68;\n  --danger-bg:     var(--fis-red-soft);\n  --live:          #FE93A7;\n\n  /* ===== TYPOGRAPHY ===== */\n  --font-sans: 'Outfit', system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-display: 'Outfit', system-ui, -apple-system, sans-serif;\n  --font-mono: ui-monospace, 'SF Mono', Menlo, monospace;\n\n  /* Letter-spacing — brand default is -2% across headings and large body */\n  --ls-tight:   -0.02em;\n  --ls-default: -0.01em;\n  --ls-wide:     0.02em;\n\n  /* Type scale (mobile-first; px values) */\n  --fs-display:  64px;\n  --fs-h1:       44px;\n  --fs-h2:       32px;\n  --fs-h3:       24px;\n  --fs-h4:       20px;\n  --fs-body-lg:  18px;\n  --fs-body:     16px;\n  --fs-body-sm:  14px;\n  --fs-caption:  12px;\n  --fs-micro:    10px;\n\n  --lh-tight: 1.05;\n  --lh-snug:  1.2;\n  --lh-body:  1.5;\n  --lh-loose: 1.7;\n\n  /* ===== SPACING (4px baseline) ===== */\n  --sp-0:   0;\n  --sp-1:   4px;\n  --sp-2:   8px;\n  --sp-3:   12px;\n  --sp-4:   16px;\n  --sp-5:   20px;\n  --sp-6:   24px;\n  --sp-8:   32px;\n  --sp-10:  40px;\n  --sp-12:  48px;\n  --sp-16:  64px;\n  --sp-20:  80px;\n  --sp-24:  96px;\n\n  /* ===== RADII ===== */\n  --r-sm:   8px;\n  --r-md:   12px;\n  --r-lg:   16px;\n  --r-xl:   20px;\n  --r-2xl:  24px;\n  --r-3xl:  32px;\n  --r-pill: 999px;\n\n  /* ===== SHADOWS (soft, low-contrast — no hard drop shadows) ===== */\n  --shadow-xs: 0 1px 2px rgba(42,43,67,0.04);\n  --shadow-sm: 0 2px 6px rgba(42,43,67,0.05);\n  --shadow-md: 0 8px 24px rgba(42,43,67,0.06);\n  --shadow-lg: 0 20px 48px rgba(42,43,67,0.08);\n  --shadow-ring: 0 0 0 4px rgba(139,117,238,0.18);\n\n  /* ===== MOTION ===== */\n  --ease-out:    cubic-bezier(0.22, 1, 0.36, 1);\n  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);\n  --dur-fast:    120ms;\n  --dur-base:    220ms;\n  --dur-slow:    420ms;\n}\n\n/* ===== BASE SEMANTIC ELEMENTS ===== */\nhtml { color: var(--fg-1); font-family: var(--font-sans); }\nbody { margin: 0; background: var(--bg-1); font-size: var(--fs-body); line-height: var(--lh-body); letter-spacing: var(--ls-default); -webkit-font-smoothing: antialiased; }\n\nh1, .h1 { font: 600 var(--fs-h1)/var(--lh-tight) var(--font-display); letter-spacing: var(--ls-tight); color: var(--fg-1); margin: 0; }\nh2, .h2 { font: 600 var(--fs-h2)/var(--lh-snug) var(--font-display); letter-spacing: var(--ls-tight); color: var(--fg-1); margin: 0; }\nh3, .h3 { font: 600 var(--fs-h3)/var(--lh-snug) var(--font-sans); letter-spacing: var(--ls-tight); color: var(--fg-1); margin: 0; }\nh4, .h4 { font: 500 var(--fs-h4)/var(--lh-snug) var(--font-sans); letter-spacing: var(--ls-default); color: var(--fg-1); margin: 0; }\np, .p  { font: 400 var(--fs-body)/var(--lh-body) var(--font-sans); color: var(--fg-2); margin: 0; }\n.p-lg  { font-size: var(--fs-body-lg); }\n.p-sm  { font-size: var(--fs-body-sm); }\n.caption { font-size: var(--fs-caption); color: var(--fg-3); letter-spacing: var(--ls-wide); text-transform: none; }\n\n/* Display — brand hero style (\"Diseñando la fisioterapia del futuro\") */\n.display {\n  font: 600 var(--fs-display)/0.95 var(--font-display);\n  letter-spacing: -0.03em;\n  color: var(--fg-1);\n}\n.display em,\n.display-accent {\n  font-weight: 200;\n  font-style: normal;\n  color: var(--fg-2);\n}\n\ncode, kbd { font-family: var(--font-mono); font-size: 0.95em; background: var(--bg-2); padding: 2px 6px; border-radius: 6px; }\n<\u002Fstyle>\n<style>/* Fisify Insurtech Brasil — Landing + Form */\n\n* { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\nbody {\n  font-family: 'Outfit', system-ui, -apple-system, sans-serif;\n  color: var(--fis-ink-900);\n  background: #fff;\n  letter-spacing: -0.01em;\n  -webkit-font-smoothing: antialiased;\n  font-feature-settings: \"ss01\" on, \"cv11\" on;\n}\n\na { color: inherit; text-decoration: none; }\nbutton { font-family: inherit; }\n\n/* ================ TOP BAR ================ */\n.topbar {\n  position: sticky; top: 0; z-index: 30;\n  background: rgba(255,255,255,0.85);\n  backdrop-filter: blur(14px);\n  -webkit-backdrop-filter: blur(14px);\n  border-bottom: 1px solid rgba(42,43,67,0.06);\n}\n.topbar-inner {\n  max-width: 1280px; margin: 0 auto;\n  padding: 16px 32px;\n  display: flex; align-items: center; justify-content: space-between;\n}\n.topbar .logo { height: 26px; display: block; }\n.topbar .event-pill {\n  display: inline-flex; align-items: center; gap: 8px;\n  padding: 6px 12px 6px 8px;\n  background: var(--fis-purple-50);\n  border: 1px solid var(--fis-purple-200);\n  border-radius: 999px;\n  font: 500 12px/1 'Outfit'; letter-spacing: 0.02em;\n  color: var(--fis-purple-700);\n}\n.topbar .event-pill .live-dot {\n  width: 6px; height: 6px; border-radius: 999px;\n  background: var(--fis-pink-live);\n  box-shadow: 0 0 0 4px rgba(254,147,167,0.25);\n  animation: pulse 2s ease-in-out infinite;\n}\n@keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.5 } }\n\n/* ================ HERO ================ */\n.hero {\n  position: relative;\n  padding: 56px 32px 80px;\n  overflow: hidden;\n  background:\n    radial-gradient(1100px 600px at 85% -10%, rgba(198,181,244,0.45), transparent 55%),\n    radial-gradient(900px 500px at -5% 30%, rgba(254,147,167,0.20), transparent 55%),\n    linear-gradient(180deg, #FBF7FF 0%, #FFFFFF 100%);\n}\n.hero-inner {\n  max-width: 1280px; margin: 0 auto;\n  display: grid;\n  grid-template-columns: 1.05fr 0.95fr;\n  gap: 64px;\n  align-items: start;\n}\n.hero-left { padding-top: 24px; }\n.hero .kicker {\n  display: inline-flex; align-items: center; gap: 10px;\n  padding: 8px 14px;\n  background: #fff;\n  border: 1px solid var(--fis-ink-100);\n  border-radius: 999px;\n  font: 500 12px/1 'Outfit'; letter-spacing: 0.06em;\n  text-transform: uppercase;\n  color: var(--fis-purple-700);\n  box-shadow: var(--shadow-xs);\n  margin-bottom: 24px;\n}\n.hero .kicker svg { width: 14px; height: 14px; }\n\n.hero h1 {\n  font: 600 60px/1.0 'Outfit';\n  letter-spacing: -0.035em;\n  margin: 0 0 24px;\n  text-wrap: balance;\n}\n.hero h1 .thin { font-weight: 200; color: var(--fis-ink-700); display: block; font-size: 0.78em; margin-top: 6px; letter-spacing: -0.02em; }\n.hero h1 .grad {\n  background: linear-gradient(120deg, #8B75EE 0%, #FE93A7 100%);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n}\n\n.hero p.lead {\n  font: 300 19px/1.55 'Outfit';\n  color: var(--fis-ink-700);\n  letter-spacing: -0.01em;\n  max-width: 510px;\n  margin: 0 0 28px;\n}\n\n.stat-row {\n  display: flex;\n  gap: 32px;\n  padding: 18px 22px;\n  background: #fff;\n  border: 1px solid var(--fis-ink-100);\n  border-radius: 18px;\n  box-shadow: var(--shadow-sm);\n  max-width: 520px;\n}\n.stat-row .stat .num {\n  font: 600 26px/1 'Outfit';\n  letter-spacing: -0.03em;\n  background: linear-gradient(120deg, #8B75EE, #FE93A7);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n}\n.stat-row .stat .lbl {\n  font: 400 12px/1.3 'Outfit';\n  color: var(--fis-ink-500);\n  margin-top: 6px;\n  letter-spacing: -0.005em;\n}\n.stat-row .divider {\n  width: 1px; background: var(--fis-ink-100);\n}\n\n/* HubSpot embed styling — match brand */\n.hubspot-target {\n  margin-top: 8px;\n  min-height: 560px;\n}\n.hubspot-target .hs-form-frame,\n.hubspot-target > div {\n  height: auto !important;\n  min-height: 560px !important;\n}\n.hubspot-target iframe {\n  width: 100% !important;\n  min-height: 560px !important;\n  border: 0 !important;\n  display: block;\n}\n.hubspot-target form {\n place-items: center;\n  pointer-events: none;\n}\n.aurya-card .pulse-rings .ring {\n  position: absolute;\n  border-radius: 999px;\n  border: 1.5px solid rgba(255,255,255,0.35);\n}\n.aurya-card .pulse-rings .ring.r1 { width: 220px; height: 220px; }\n.aurya-card .pulse-rings .ring.r2 { width: 320px; height: 320px; opacity: 0.6; }\n.aurya-card .pulse-rings .ring.r3 { width: 440px; height: 440px; opacity: 0.3; }\n\n.aurya-card .core {\n  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);\n  width: 140px; height: 140px;\n  border-radius: 999px;\n  background: rgba(255,255,255,0.95);\n  box-shadow: 0 20px 60px rgba(63,60,99,0.4);\n  display: grid; place-items: center;\n  font: 600 22px/1 'Outfit'; letter-spacing: -0.02em;\n  color: var(--fis-ink-900);\n}\n.aurya-card .core span.meta {\n  font: 400 11px/1 'Outfit'; color: var(--fis-purple-500);\n  letter-spacing: 0.1em; text-transform: uppercase;\n  margin-top: 6px;\n}\n.aurya-card .label {\n  position: absolute; bottom: 28px; left: 28px;\n  font: 500 12px/1 'Outfit'; letter-spacing: 0.08em; text-transform: uppercase;\n  color: rgba(255,255,255,0.85);\n}\n\n.aurya h2 .name {\n  font-weight: 600;\n}\n.aurya .checks { list-style: none; padding: 0; margin: 28px 0 0; display: grid; gap: 12px; }\n.aurya .checks li {\n  display: flex; gap: 12px; align-items: center;\n  padding: 12px 16px;\n  background: #fff;\n  border: 1px solid var(--fis-ink-100);\n  border-radius: 14px;\n  font: 400 15px/1.4 'Outfit'; color: var(--fis-ink-700);\n}\n.aurya .checks .n {\n  width: 24px; height: 24px; border-radius: 6px;\n  background: var(--fis-purple-50);\n  color: var(--fis-purple-600);\n  display: grid; place-items: center;\n  font: 600 11px/1 'Outfit';\n  flex: none;\n}\n\n/* Why grid */\n.why-grid {\n  display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;\n}\n.why {\n  padding: 28px;\n  border-radius: 20px;\n  background: rgba(255,255,255,0.04);\n  border: 1px solid rgba(255,255,255,0.08);\n}\n.why .n {\n  font: 600 12px/1 'Outfit'; letter-spacing: 0.04em;\n  color: var(--fis-purple-300);\n  margin-bottom: 22px;\n}\n.why h4 {\n  font: 600 18px/1.2 'Outfit';\n  letter-spacing: -0.02em;\n  color: #fff;\n  margin: 0 0 10px;\n}\n.why p {\n  font: 300 14px/1.5 'Outfit';\n  color: rgba(255,255,255,0.65);\n  margin: 0;\n}\n\n/* Adherence band */\n.adh-band {\n  border-radius: 28px;\n  padding: 56px;\n  background:\n    radial-gradient(600px 300px at 80% 20%, rgba(254,147,167,0.25), transparent 60%),\n    radial-gradient(500px 300px at 10% 80%, rgba(139,117,238,0.25), transparent 60%),\n    #2A2B43;\n  display: grid; grid-template-columns: 1fr 1fr; gap: 56px; align-items: center;\n}\n.adh-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }\n.adh-stat {\n  background: rgba(255,255,255,0.05);\n  border: 1px solid rgba(255,255,255,0.08);\n  border-radius: 18px;\n  padding: 24px;\n}\n.adh-stat .big {\n  font: 600 48px/1 'Outfit';\n  letter-spacing: -0.04em;\n  background: linear-gradient(120deg, #C6B5F4, #FE93A7);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n}\n.adh-stat .lbl {\n  font: 400 13px/1.4 'Outfit';\n  color: rgba(255,255,255,0.65);\n  margin-top: 8px;\n}\n\n/* CTA closing band */\n.close-cta {\n  text-align: center;\n  padding: 96px 32px;\n  background: linear-gradient(135deg, #C6B5F4 0%, #FE93A7 100%);\n  position: relative;\n  overflow: hidden;\n}\n.close-cta::before {\n  content: \"\";\n  position: absolute; inset: 0;\n  background:\n    radial-gradient(400px 300px at 20% 30%, rgba(255,255,255,0.18), transparent 60%),\n    radial-gradient(400px 300px at 80% 70%, rgba(255,255,255,0.12), transparent 60%);\n  pointer-events: none;\n}\n.close-cta-inner { position: relative; max-width: 720px; margin: 0 auto; }\n.close-cta h2 {\n  font: 600 48px/1.05 'Outfit';\n  letter-spacing: -0.03em;\n  color: #fff;\n  margin: 0 0 16px;\n  text-wrap: balance;\n}\n.close-cta h2 .thin { font-weight: 200; }\n.close-cta p {\n  font: 300 18px/1.5 'Outfit';\n  color: rgba(255,255,255,0.85);\n  margin: 0 0 32px;\n}\n.close-cta .scroll-up {\n  display: inline-flex; align-items: center; gap: 10px;\n  padding: 16px 28px;\n  background: #fff;\n  border-radius: 999px;\n  border: none;\n  font: 600 15px/1 'Outfit';\n  letter-spacing: -0.01em;\n  color: var(--fis-purple-600);\n  cursor: pointer;\n  box-shadow: 0 12px 30px rgba(0,0,0,0.15);\n  transition: transform 160ms var(--ease-out);\n}\n.close-cta .scroll-up:hover { transform: translateY(-2px); }\n\n/* Footer */\n.foot {\n  padding: 36px 32px;\n  background: #fff;\n  border-top: 1px solid var(--fis-ink-100);\n}\n.foot-inner {\n  max-width: 1280px; margin: 0 auto;\n  display: flex; justify-content: space-between; align-items: center;\n  font: 400 12px/1.5 'Outfit'; color: var(--fis-ink-400);\n  flex-wrap: wrap; gap: 12px;\n}\n.foot-inner a { color: var(--fis-ink-500); }\n.foot-inner a:hover { color: var(--fis-purple-600); }\n\n/* ================ DASHBOARD (hidden /leads) ================ */\n.dash {\n  min-height: 100vh;\n  background: var(--fis-ink-50);\n  padding: 24px 32px;\n}\n.dash-head {\n  max-width: 1280px; margin: 0 auto 24px;\n  display: flex; align-items: center; justify-content: space-between;\n}\n.dash-title { font: 600 28px/1.1 'Outfit'; letter-spacing: -0.025em; }\n.dash-title .thin { font-weight: 200; color: var(--fis-ink-500); }\n.dash-meta { font: 400 13px/1.4 'Outfit'; color: var(--fis-ink-500); margin-top: 4px; }\n\n.dash-stats {\n  max-width: 1280px; margin: 0 auto 20px;\n  display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;\n}\n.ds-card {\n  background: #fff; border: 1px solid var(--fis-ink-100);\n  border-radius: 16px; padding: 18px;\n}\n.ds-card .lbl { font: 500 11px/1 'Outfit'; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fis-ink-500); margin-bottom: 12px; }\n.ds-card .val { font: 600 30px/1 'Outfit'; letter-spacing: -0.03em; color: var(--fis-ink-900); }\n.ds-card.accent .val { background: linear-gradient(120deg, #8B75EE, #FE93A7); -webkit-background-clip: text; background-clip: text; color: transparent; }\n\n.dash-table {\n  max-width: 1280px; margin: 0 auto;\n  background: #fff; border: 1px solid var(--fis-ink-100);\n  border-radius: 16px; overflow: hidden;\n}\n.dt-tools {\n  padding: 16px 20px;\n  display: flex; gap: 12px; align-items: center; justify-content: space-between;\n  border-bottom: 1px solid var(--fis-ink-100);\n}\n.dt-tools input {\n  padding: 10px 14px;\n  border: 1px solid var(--fis-ink-100);\n  border-radius: 10px;\n  font: 400 13px/1 'Outfit'; outline: none;\n  width: 240px;\n}\n.dt-tools .btn {\n  padding: 9px 14px; border-radius: 10px;\n  background: var(--fis-purple-50); color: var(--fis-purple-700);\n  border: 1px solid var(--fis-purple-200);\n  font: 500 12px/1 'Outfit'; cursor: pointer;\n}\n.dt-tools .btn.danger { background: #FFF7F7; color: var(--fis-pink-warn); border-color: var(--fis-red-soft); margin-left: 8px; }\n\ntable.leads {\n  width: 100%; border-collapse: collapse; font: 400 13px/1.4 'Outfit';\n}\ntable.leads th {\n  text-align: left;\n  padding: 12px 20px;\n  font: 500 11px/1 'Outfit'; letter-spacing: 0.06em; text-transform: uppercase;\n  color: var(--fis-ink-500);\n  background: var(--fis-ink-50);\n  border-bottom: 1px solid var(--fis-ink-100);\n}\ntable.leads td {\n  padding: 14px 20px;\n  border-bottom: 1px solid var(--fis-ink-100);\n  color: var(--fis-ink-900);\n  vertical-align: middle;\n}\ntable.leads tr:last-child td { border-bottom: none; }\ntable.leads tr:hover td { background: var(--fis-ink-50); }\ntable.leads td.muted { color: var(--fis-ink-500); }\n.tag {\n  display: inline-block; padding: 4px 10px; border-radius: 999px;\n  font: 500 11px/1.2 'Outfit'; letter-spacing: 0.02em;\n  background: var(--fis-purple-50); color: var(--fis-purple-700);\n}\n.dash-empty {\n  padding: 60px 20px; text-align: center; color: var(--fis-ink-500);\n  font: 300 16px/1.5 'Outfit';\n}\n.dash-empty .em-icon {\n  width: 56px; height: 56px; border-radius: 999px;\n  background: var(--fis-purple-50); color: var(--fis-purple-500);\n  display: grid; place-items: center; margin: 0 auto 16px;\n}\n\n.qr-link {\n  display: inline-flex; align-items: center; gap: 8px;\n  padding: 10px 16px;\n  background: #fff; border: 1px solid var(--fis-ink-100);\n  border-radius: 999px;\n  font: 500 13px/1 'Outfit'; color: var(--fis-ink-700);\n  cursor: pointer;\n}\n.qr-link:hover { background: var(--fis-ink-50); }\n\n/* Responsive */\n@media (max-width: 1100px) {\n  .hero-inner { grid-template-columns: 1fr; gap: 40px; }\n  .pillars, .journey, .why-grid { grid-template-columns: 1fr 1fr; }\n  .tech-split, .aurya, .adh-band { grid-template-columns: 1fr; gap: 40px; }\n  .aurya-grid { grid-template-columns: 1fr 1fr; }\n  .journey::before { display: none; }\n  .dash-stats { grid-template-columns: 1fr 1fr; }\n  .hero h1 { font-size: 48px; }\n  .section-title, .close-cta h2 { font-size: 36px; }\n}\n@media (max-width: 640px) {\n  .hero { padding: 32px 20px 56px; }\n  .section { padding: 64px 20px; }\n  .pillars, .journey, .why-grid, .aurya-grid { grid-template-columns: 1fr; }\n  .hero h1 { font-size: 38px; }\n  .topbar-inner { padding: 14px 20px; }\n  .form-card { padding: 24px; }\n  .field.row-2 { grid-template-columns: 1fr; }\n  .adh-band { padding: 36px 24px; }\n  .adh-stats { grid-template-columns: 1fr 1fr; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n<div id=\"app\"><\u002Fdiv>\n\n<script src=\"05cdca5e-084d-426c-a064-a935e4373435\" crossorigin=\"anonymous\"><\u002Fscript>\n<script src=\"3066772a-9ec8-4fde-be93-a96f5755e4a7\" crossorigin=\"anonymous\"><\u002Fscript>\n\n<script src=\"3e8ed110-e475-4c09-b7f1-421bc07c83ab\"><\u002Fscript>\n<script src=\"733446b3-9d47-405b-9ef5-d056f0d17815\"><\u002Fscript>\n<script src=\"c2a4b349-90d0-46da-bd70-81874cd5569c\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
